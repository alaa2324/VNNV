<!DOCTYPE html><html lang="en"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">    <title>VNNV L2 Platform</title>    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">    <link rel="stylesheet" href="style.css">    <style>        html, body { overflow-x: hidden; width: 100%; position: relative; }        #bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }        .menu-toggle { display: none; cursor: pointer; z-index: 3000; color: white; font-size: 24px; }        @media(max-width: 768px) {            .menu-toggle { display: block; }            nav#nav-menu {                position: fixed; top: 0; right: -100%;                width: 280px; height: 100vh;                background: rgba(2, 6, 23, 0.95);                backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);                display: flex; flex-direction: column;                padding: 100px 30px; gap: 20px;                transition: right 0.3s ease-in-out;                z-index: 2500; border-left: 1px solid rgba(255, 255, 255, 0.1);            }            nav#nav-menu.active { right: 0; }            .dropdown-content {                display: none; flex-direction: column;                padding-left: 20px; border-left: 1px solid #8b5cf6; margin-top: 10px;            }            .dropdown-content.show { display: flex; }        }    </style></head><body><div id="bg"></div><header class="topbar">    <div class="logo">VN<span>NV</span></div>    <div class="menu-toggle" id="mobile-menu"><i class="fas fa-bars"></i></div>    <nav id="nav-menu">        <a href="index.html">Home</a>        <div class="nav-dropdown">            <a href="#" id="workshops-toggle">Modules <i class="fas fa-chevron-down"></i></a>            <div class="dropdown-content" id="workshops-dropdown">                <a href="database.html">Database</a>                <a href="network.html">Network</a>                <a href="os.html">Operating System</a>                <a href="oop.html">OOP</a>                <a href="tl.html">Theory Language</a>            </div>        </div>        <a href="about.html">About</a>    </nav></header><section class="hero">    <h1>L2 Computer Science Platform</h1>    <p>Access modules, courses, TDs, TPs and exams</p></section><section class="form-container">    <form id="form" action="open_module.php" method="POST">        <div class="grid">            <div class="field">                <label>Full Name</label>                <input name="name" required>            </div>            <div class="field">                <label>Email</label>                <input type="email" name="email" required>            </div>            <div class="field">                <label>Phone Number</label>                <input type="number" name="phone" required>            </div>            <div class="field">                <label>University Registration Number</label>                <input type="number" name="registration" required>            </div>            <div class="field full">                <label>University Year</label>                <select name="year"><option>L2</option></select>            </div>            <div class="field full">                <label>Module</label>                <select name="workshop">                    <option value="database">Database</option>                    <option value="network">Network</option>                    <option value="os">Operating System (OS)</option>                    <option value="oop">Object Oriented Programming (OOP)</option>                    <option value="tl">Theory Language (TL)</option>                </select>            </div>            <button id="submitBtn" type="submit" class="submit-btn">open module</button>        </div>    </form>    <div id="success" class="success-box">opening module! Redirecting...</div></section><p class="follow-title">Follow us</p><div class="social-bar">    <a href="https://www.facebook.com/share/1DfjcoThgR/" target="_blank" class="social-btn">        <i class="fab fa-facebook-f"></i>    </a></div><footer><p>© 2026 Bakhanou</p></footer><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script><script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script><script>    VANTA.NET({        el: "#bg", mouseControls: true, touchControls: true, gyroControls: false,        minHeight: 200, minWidth: 200, scale: 1, scaleMobile: 1,        color: 0x4f46e5, backgroundColor: 0x20617,        points: 10, maxDistance: 20, spacing: 15    });    const mobileMenu = document.getElementById('mobile-menu');    const navMenu = document.getElementById('nav-menu');    const workshopsToggle = document.getElementById('workshops-toggle');    const workshopsDropdown = document.getElementById('workshops-dropdown');    mobileMenu.addEventListener('click', () => {        navMenu.classList.toggle('active');        const icon = mobileMenu.querySelector('i');        icon.classList.toggle('fa-bars');        icon.classList.toggle('fa-times');    });    workshopsToggle.addEventListener('click', (e) => {        e.preventDefault();        e.stopPropagation();        workshopsDropdown.classList.toggle('show');    });    // Fix: use anchor tags directly without JS interception    // Navigation works natively — no preventDefault on regular links    const scriptURL ="https://script.google.com/macros/s/AKfycbyOjN_ZKyvXbMJ8xHcBUGfdmK549cZVKh2KlqMLF7R_T2pCn3CtYAy6JKbzRE4yGeLv/exec";    const form = document.getElementById("form");    const successBox = document.getElementById("success");    const submitBtn = document.getElementById("submitBtn");    form.addEventListener("submit", e => {        e.preventDefault();        submitBtn.disabled = true;        submitBtn.innerText = "Opening...";        const workshop = form.querySelector('[name="workshop"]').value;        successBox.style.display = "block";        const pages = {            database: "database.html", network: "network.html",            os: "os.html", oop: "oop.html", tl: "tl.html"        };        setTimeout(() => {            window.location.href = pages[workshop] || "index.html";        }, 50);    });</script></body></html>
